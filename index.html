<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Customer Support Portal</title>
    
    <style>
        :root {
            --sf-blue: #0176d3;
            --sf-hover: #014486;
            --sf-bg: #f3f3f3;
            --sf-border: #dddbda;
            --sf-text: #181818;
            --sf-label: #3e3e3c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
            background-color: var(--sf-bg);
            color: var(--sf-text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 480px;
            border-top: 5px solid var(--sf-blue);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h2 {
            margin: 0;
            color: var(--sf-blue);
            font-size: 26px;
            font-weight: 700;
        }
        .header p {
            color: var(--sf-label);
            font-size: 14px;
            margin-top: 8px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 13px;
            color: var(--sf-label);
            margin-bottom: 6px;
            font-weight: 700;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--sf-border);
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--sf-blue);
            box-shadow: 0 0 4px rgba(1, 118, 211, 0.4);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        input[type="submit"] {
            background-color: var(--sf-blue);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        input[type="submit"]:hover {
            background-color: var(--sf-hover);
        }
        .logo-placeholder {
            font-size: 40px;
            margin-bottom: 10px;
            color: var(--sf-blue);
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header">
            <div class="logo-placeholder">☁️</div>
            <h2>Acme Corp Support</h2>
            <p>Submit your request below.</p>
        </div>

        <form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00Dg500000AWjXK" method="POST">

            <input type="hidden" name="orgid" value="00Dg500000AWjXK">
            <!-- <input type="hidden" name="retURL" value="https://www.salesforce.com"> -->

            <div class="form-group">
                <label for="name">Contact Name</label>
                <input id="name" maxlength="80" name="name" type="text" placeholder="your name" required />
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" maxlength="80" name="email" type="text" placeholder="your email" required />
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input id="subject" maxlength="80" name="subject" type="text" placeholder="case subject" required />
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea name="description" id="description" placeholder="issue description" required></textarea>
            </div>

            <input type="submit" name="submit" value="Submit Case">

        </form>
    </div>

</body>
</html>
